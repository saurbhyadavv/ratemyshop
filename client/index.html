<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Primary Meta Tags -->
    <title>RateMyShop.in — Rate Any Local Shop by UPI ID | India's Shop Review Platform</title>
    <meta name="description" content="RateMyShop is India's first community-driven review platform for local shops. Rate any shop — kirana stores, salons, pharmacies — by scanning or entering its UPI ID. No app needed. Free forever." />
    <meta name="keywords" content="rate shop, review shop, UPI review, local shop reviews, India shop ratings, ratemyshop, kirana store reviews, shop rating by UPI, community reviews India, local business reviews" />
    <meta name="author" content="RateMyShop" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ratemyshop.in" />

    <!-- Theme -->
    <meta name="theme-color" content="#FF6B2B" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ratemyshop.in" />
    <meta property="og:title" content="RateMyShop.in — Rate Any Local Shop by UPI ID" />
    <meta property="og:description" content="India's first community-driven review platform for local shops. Scan or enter a UPI ID to read and write reviews. No app needed." />
    <meta property="og:site_name" content="RateMyShop" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RateMyShop.in — Rate Any Local Shop by UPI ID" />
    <meta name="twitter:description" content="India's first community-driven review platform for local shops. Scan UPI QR or enter UPI ID to read and write reviews." />

    <!-- WebSite Schema for Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RateMyShop",
      "url": "https://ratemyshop.in",
      "description": "India's first community-driven review platform for local shops. Rate any shop by scanning its UPI QR code.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ratemyshop.in/shop/{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
